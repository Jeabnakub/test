<!doctype html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPPORTEWP</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- ✅ เพิ่ม Excel -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { background:#111; color:#fff; font-family:sans-serif; }
</style>
</head>

<body class="p-6">

<h1 class="text-xl mb-4">SUPPORTEWP</h1>

<div class="flex gap-3 mb-4">
  <button onclick="fetchData()" class="bg-green-500 px-4 py-2 rounded">ดึงข้อมูล</button>
  <button id="exportBtn" onclick="exportExcel()" disabled class="bg-yellow-500 px-4 py-2 rounded">Export Excel</button>
</div>

<div class="mb-4">
  <div>Case ทั้งหมด: <span id="totalCases">-</span></div>
  <div>จำนวนเจ้าหน้าที่: <span id="totalStaff">-</span></div>
  <div>เฉลี่ย: <span id="avgCases">-</span></div>
</div>

<canvas id="chart" height="120"></canvas>

<table class="mt-6 w-full border">
<thead>
<tr>
<th>#</th>
<th>ชื่อ</th>
<th>Case</th>
<th>%</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let staffData = [];
let chart;

const SHEET_ID = '1ZCgi_egwYyQMnd33WjhW2g_KsFXzbkBajgj96Hn1U_g';
const GID = '404719184';

async function fetchData() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;
    const res = await fetch(url);
    const text = await res.text();

    const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
    processData(json);

    Swal.fire("สำเร็จ", "โหลดข้อมูลแล้ว", "success");
  } catch(e) {
    Swal.fire("Error", e.message, "error");
  }
}

function processData(data) {
  const rows = data.table.rows;
  const cols = data.table.cols;

  // หา column ชื่อ
  let staffCol = cols.findIndex(c => (c.label || '').includes('ชื่อ'));
  if (staffCol === -1) staffCol = 0;

  const count = {};

  rows.forEach(r => {
    const name = r.c?.[staffCol]?.v;
    if (name) count[name] = (count[name] || 0) + 1;
  });

  staffData = Object.entries(count)
    .map(([name,count]) => ({name,count}))
    .sort((a,b)=>b.count-a.count);

  document.getElementById('exportBtn').disabled = false;

  updateUI();
}

function updateUI() {
  const total = staffData.reduce((s,d)=>s+d.count,0);
  const avg = staffData.length ? total / staffData.length : 0;

  document.getElementById('totalCases').textContent = total;
  document.getElementById('totalStaff').textContent = staffData.length;
  document.getElementById('avgCases').textContent = avg.toFixed(1);

  updateTable(total);
  updateChart();
}

function updateTable(total) {
  const tbody = document.getElementById('table');

  tbody.innerHTML = staffData.map((s,i)=>{
    const pct = ((s.count/total)*100).toFixed(1);
    return `
      <tr>
        <td>${i+1}</td>
        <td>${s.name}</td>
        <td>${s.count}</td>
        <td>${pct}%</td>
      </tr>
    `;
  }).join('');
}

function updateChart() {
  const ctx = document.getElementById('chart');

  const top = staffData.slice(0,5);

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type:'bar',
    data:{
      labels: top.map(s=>s.name),
      datasets:[{
        data: top.map(s=>s.count)
      }]
    }
  });
}


// ✅🔥 EXPORT EXCEL (ตัวใหม่)
function exportExcel() {
  if (!staffData.length) return;

  const total = staffData.reduce((s,d)=>s+d.count,0);
  const avg = total / staffData.length;

  const rows = [
    ['#','ชื่อเจ้าหน้าที่','จำนวน Case','สัดส่วน (%)','สถานะ'],
    ...staffData.map((s, i) => {
      const pct = ((s.count/total)*100).toFixed(1);

      let status = 'ปกติ';
      if (s.count > avg*1.5)      status = 'สูงกว่าเฉลี่ย';
      else if (s.count < avg*0.5) status = 'ต่ำกว่าเฉลี่ย';

      return [i+1, s.name, s.count, pct, status];
    }),
    [],
    ['','รวมทั้งหมด', total, '100.0', ''],
    ['','ค่าเฉลี่ย', avg.toFixed(2), '', ''],
  ];

  const ws = XLSX.utils.aoa_to_sheet(rows);

  ws['!cols'] = [
    { wch: 5 },
    { wch: 25 },
    { wch: 15 },
    { wch: 15 },
    { wch: 20 }
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'SUPPORTEWP');

  const now = new Date();
  const fname = `supportewp_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.xlsx`;

  XLSX.writeFile(wb, fname);
}
</script>

</body>
</html>
