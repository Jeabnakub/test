<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPPORTEWP | Advanced Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top left, #1e293b, #0f172a); 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 16px; 
        }
        .stat-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
            <div>
                <h1 class="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                    SUPPORTEWP
                </h1>
                <p class="text-slate-400 text-sm mt-1 tracking-wide">Real-time Performance Monitoring System</p>
            </div>
            <div class="flex gap-3 w-full md:w-auto">
                <button onclick="fetchData()" id="fetchBtn" class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-semibold transition-all shadow-lg shadow-blue-900/20 active:scale-95">
                    ดึงข้อมูล
                </button>
                <button id="exportBtn" onclick="exportExcel()" disabled class="flex-1 md:flex-none bg-white/10 hover:bg-white/20 text-white px-8 py-3 rounded-xl font-semibold transition-all disabled:opacity-30 disabled:cursor-not-allowed">
                    Export Report
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass stat-card p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Total Tickets</p>
                        <h2 id="totalCases" class="text-4xl font-bold italic">-</h2>
                    </div>
                    <div class="p-3 bg-blue-500/10 rounded-lg text-blue-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4v-3a2 2 0 00-2-2H5z" />
                        </svg>
                    </div>
                </div>
            </div>
            <div class="glass stat-card p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Active Agents</p>
                        <h2 id="totalStaff" class="text-4xl font-bold italic">-</h2>
                    </div>
                    <div class="p-3 bg-emerald-500/10 rounded-lg text-emerald-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                        </svg>
                    </div>
                </div>
            </div>
            <div class="glass stat-card p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Avg per Agent</p>
                        <h2 id="avgCases" class="text-4xl font-bold italic">-</h2>
                    </div>
                    <div class="p-3 bg-amber-500/10 rounded-lg text-amber-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
            <div class="lg:col-span-2 glass p-6">
                <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span> Top Performance
                </h3>
                <div class="relative h-[300px]">
                    <canvas id="chart"></canvas>
                </div>
            </div>

            <div class="lg:col-span-3 glass p-6 flex flex-col">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                    <h3 class="text-lg font-bold">Agent Insights</h3>
                    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="ค้นหาชื่อเจ้าหน้าที่..." 
                           class="bg-slate-800/50 border border-slate-700 text-sm px-4 py-2 rounded-lg focus:outline-none focus:border-blue-500 w-full md:w-64">
                </div>
                
                <div class="overflow-x-auto flex-1 h-[300px]">
                    <table class="w-full text-left border-collapse">
                        <thead class="sticky top-0 bg-slate-800">
                            <tr>
                                <th class="text-slate-400 text-xs font-bold uppercase p-4">Rank</th>
                                <th class="text-slate-400 text-xs font-bold uppercase p-4">Name</th>
                                <th class="text-slate-400 text-xs font-bold uppercase p-4">Count</th>
                                <th class="text-slate-400 text-xs font-bold uppercase p-4">Share</th>
                            </tr>
                        </thead>
                        <tbody id="table">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let staffData = [];
        let chart;
        const SHEET_ID = '1ZCgi_egwYyQMnd33WjhW2g_KsFXzbkBajgj96Hn1U_g';
        const GID = '404719184';

        async function fetchData() {
            const btn = document.getElementById('fetchBtn');
            btn.innerHTML = `<span class="animate-pulse">Loading...</span>`;
            btn.disabled = true;

            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;
                const res = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
                
                processData(json);
                Swal.fire({ 
                    icon: 'success', 
                    title: 'Synchronized!', 
                    background: '#1e293b', 
                    color: '#fff', 
                    timer: 1500, 
                    showConfirmButton: false 
                });
            } catch(e) {
                Swal.fire({ icon: 'error', title: 'Fetch Failed', text: e.message });
            } finally {
                btn.innerHTML = 'ดึงข้อมูล';
                btn.disabled = false;
            }
        }

        function processData(data) {
            const rows = data.table.rows;
            const cols = data.table.cols;
            let staffCol = cols.findIndex(c => (c.label || '').includes('ชื่อ'));
            if (staffCol === -1) staffCol = 0;

            const count = {};
            rows.forEach(r => {
                const name = r.c?.[staffCol]?.v;
                if (name) count[name] = (count[name] || 0) + 1;
            });

            staffData = Object.entries(count)
                .map(([name, count]) => ({ name, count }))
                .sort((a, b) => b.count - a.count);

            document.getElementById('exportBtn').disabled = false;
            updateUI();
        }

        function updateUI() {
            const total = staffData.reduce((s, d) => s + d.count, 0);
            const avg = staffData.length ? total / staffData.length : 0;

            document.getElementById('totalCases').textContent = total.toLocaleString();
            document.getElementById('totalStaff').textContent = staffData.length;
            document.getElementById('avgCases').textContent = avg.toFixed(1);

            updateTable(total);
            updateChart();
        }

        function updateTable(total) {
            const tbody = document.getElementById('table');
            tbody.innerHTML = staffData.map((s, i) => {
                const pct = ((s.count / total) * 100).toFixed(1);
                return `
                    <tr class="group hover:bg-white/5 transition-colors">
                        <td class="p-4 text-slate-500 font-mono">#${(i + 1).toString().padStart(2, '0')}</td>
                        <td class="p-4 font-semibold text-slate-200">${s.name}</td>
                        <td class="p-4"><span class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-sm font-bold">${s.count}</span></td>
                        <td class="p-4">
                            <div class="flex items-center gap-3">
                                <div class="flex-1 bg-slate-700 h-1.5 rounded-full overflow-hidden min-w-[60px]">
                                    <div class="bg-gradient-to-r from-blue-500 to-emerald-400 h-full transition-all duration-1000" style="width: ${pct}%"></div>
                                </div>
                                <span class="text-xs font-medium text-slate-400">${pct}%</span>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterTable() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.getElementById('table').getElementsByTagName('tr');
            
            for (let i = 0; i < rows.length; i++) {
                const name = rows[i].getElementsByTagName('td')[1].textContent.toLowerCase();
                rows[i].style.display = name.includes(input) ? "" : "none";
            }
        }

        function updateChart() {
            const ctx = document.getElementById('chart').getContext('2d');
            const top = staffData.slice(0, 5);

            if (chart) chart.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(59, 130, 246, 0.8)');
            gradient.addColorStop(1, 'rgba(59, 130, 246, 0.05)');

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: top.map(s => s.name),
                    datasets: [{
                        label: 'Cases',
                        data: top.map(s => s.count),
                        backgroundColor: gradient,
                        borderColor: '#3b82f6',
                        borderWidth: 2,
                        borderRadius: 8,
                        barThickness: 30
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#64748b' }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
        }

        function exportExcel() {
            if (!staffData.length) return;
            const total = staffData.reduce((s, d) => s + d.count, 0);
            const avg = total / staffData.length;

            const rows = [
                ['PERFORMANCE REPORT', '', '', '', 'Generated: ' + new Date().toLocaleString()],
                ['#', 'Agent Name', 'Case Count', 'Percentage (%)', 'Status'],
                ...staffData.map((s, i) => {
                    const pct = ((s.count / total) * 100).toFixed(1);
                    let status = s.count > avg * 1.5 ? 'Excellent' : (s.count < avg * 0.5 ? 'Need Support' : 'Normal');
                    return [i + 1, s.name, s.count, pct, status];
                })
            ];

            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'DashboardData');
            XLSX.writeFile(wb, `Support_Report_${new Date().getTime()}.xlsx`);
        }
    </script>
</body>
</html>
